<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>学习门户</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 顶部导航 -->
    <nav class="nav">
        <span class="nav-logo">📚 学习门户</span>
    </nav>

    <main class="main">
        <!-- 主标签 -->
        <div class="tabs">
            <button class="tab active" data-tab="finance">📰 财经</button>
            <button class="tab" data-tab="ai-pm">🤖 AI产品</button>
        </div>

        <!-- ===== 财经区 ===== -->
        <section id="finance" class="section active">
            <!-- 子菜单 -->
            <div class="sub-tabs">
                <button class="sub-tab active" data-sub="realtime">⚡ 实时新闻</button>
                <button class="sub-tab" data-sub="daily">📊 每日总结</button>
            </div>

            <!-- 子菜单：实时新闻 -->
            <div id="realtime" class="sub-content active">
                <div id="realtimeList" class="news-list">
                    <div class="empty-hint">加载中...</div>
                </div>
            </div>

            <!-- 子菜单：每日总结 -->
            <div id="daily" class="sub-content">
                <!-- 视角筛选 -->
                <div class="filter-row">
                    <button class="filter-btn active" data-investor="all">全部</button>
                    <button class="filter-btn" data-investor="templeton">🌍 邓普顿</button>
                    <button class="filter-btn" data-investor="buffett">💰 巴菲特</button>
                    <button class="filter-btn" data-investor="munger">🧠 芒格</button>
                </div>

                <!-- 日期列表 -->
                <div id="dailyList" class="date-list"></div>

                <!-- 简报详情 -->
                <div id="briefingDetail" class="detail-area"></div>
            </div>
        </section>

        <!-- ===== AI产品经理区 ===== -->
        <section id="ai-pm" class="section">
            <div class="status-bar">
                <div class="streak">
                    <span class="streak-num" id="streakDays">0</span>
                    <span class="streak-label">连续打卡</span>
                </div>
                <div class="progress-mini">
                    <span id="completionRate">0%</span>
                    <div class="progress-bar-mini">
                        <div class="progress-fill-mini" id="progressFill" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <div class="knowledge-card">
                <div class="kcard-header">
                    <span class="kcard-badge">今日必学</span>
                    <span class="kcard-title" id="pmTitle">加载中...</span>
                </div>
                <div class="kcard-body" id="pmContent"></div>
                <button class="checkin-btn" id="checkinBtn">✓ 打卡</button>
            </div>

            <div class="skills-row">
                <div class="skill-item"><span class="skill-icon">🎯</span><span class="skill-name">技术理解</span></div>
                <div class="skill-item"><span class="skill-icon">📊</span><span class="skill-name">数据思维</span></div>
                <div class="skill-item"><span class="skill-icon">💡</span><span class="skill-name">产品设计</span></div>
                <div class="skill-item"><span class="skill-icon">🤝</span><span class="skill-name">团队协作</span></div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
