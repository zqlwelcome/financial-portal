<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>学习门户</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 顶部导航 - 紧凑 -->
    <nav class="nav">
        <span class="nav-logo">📚 学习门户</span>
    </nav>

    <!-- 主内容区 - 单栏紧凑布局 -->
    <main class="main">
        <!-- 标签切换 -->
        <div class="tabs">
            <button class="tab active" data-tab="news">
                <span>📰</span> 财经
            </button>
            <button class="tab" data-tab="ai-pm">
                <span>🤖</span> AI产品
            </button>
        </div>

        <!-- ===== 财经简报区 ===== -->
        <section id="news" class="section active">
            <!-- 视角切换 - 紧凑横向 -->
            <div class="filter-row">
                <button class="filter-btn active" data-investor="all">全部</button>
                <button class="filter-btn" data-investor="templeton">🌍 邓</button>
                <button class="filter-btn" data-investor="buffett">💰 巴</button>
                <button class="filter-btn" data-investor="munger">🧠 芒</button>
            </div>

            <!-- 日期列表 - 紧凑卡片 -->
            <div id="newsList" class="compact-list">
                <div class="empty-hint">加载中...</div>
            </div>

            <!-- 简报详情 - 内联展开 -->
            <div id="briefingDetail" class="detail-area hidden"></div>
        </section>

        <!-- ===== AI产品经理区 ===== -->
        <section id="ai-pm" class="section">
            <!-- 打卡状态条 -->
            <div class="status-bar">
                <div class="streak">
                    <span class="streak-num" id="streakDays">0</span>
                    <span class="streak-label">连续</span>
                </div>
                <div class="progress-mini">
                    <span id="completionRate">0%</span>
                    <div class="progress-bar-mini">
                        <div class="progress-fill-mini" id="progressFill" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <!-- 今日知识点 - 紧凑卡片 -->
            <div class="knowledge-card">
                <div class="kcard-header">
                    <span class="kcard-badge">今日必学</span>
                    <span class="kcard-title" id="pmTitle">加载中...</span>
                </div>
                <div class="kcard-body" id="pmContent"></div>
                
                <!-- 打卡按钮 -->
                <button class="checkin-btn" id="checkinBtn">
                    ✓ 打卡
                </button>
            </div>

            <!-- 能力模型 - 横向滚动 -->
            <div class="skills-row">
                <div class="skill-item">
                    <span class="skill-icon">🎯</span>
                    <span class="skill-name">技术理解</span>
                </div>
                <div class="skill-item">
                    <span class="skill-icon">📊</span>
                    <span class="skill-name">数据思维</span>
                </div>
                <div class="skill-item">
                    <span class="skill-icon">💡</span>
                    <span class="skill-name">产品设计</span>
                </div>
                <div class="skill-item">
                    <span class="skill-icon">🤝</span>
                    <span class="skill-name">团队协作</span>
                </div>
            </div>
        </section>
    </main>

    <!-- 新增按钮 -->
    <button class="fab" id="addNews">+</button>

    <!-- 新增弹窗 -->
    <div class="modal hidden" id="addNewsModal">
        <div class="modal-sheet">
            <div class="modal-handle"></div>
            <h3>添加新闻</h3>
            <form id="newsForm">
                <input type="text" id="newsTitle" required placeholder="标题">
                <input type="text" id="newsSource" placeholder="来源">
                <textarea id="newsSummary" rows="2" placeholder="摘要"></textarea>
                <select id="newsCategory">
                    <option value="market">市场动态</option>
                    <option value="policy">政策解读</option>
                    <option value="company">公司财报</option>
                    <option value="global">国际财经</option>
                </select>
                <textarea id="newsAnalysis" rows="2" placeholder="三视角点评"></textarea>
                <button type="submit" class="submit-btn">保存</button>
            </form>
            <button class="close-btn" id="modalClose">取消</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
