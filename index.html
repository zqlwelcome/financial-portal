<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌙 下班学点啥</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="alert-style.css">
    <link rel="stylesheet" href="walk.css">
    <link rel="stylesheet" href="course-center-style.css?v=3">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="nav">
        <span class="nav-logo"><span class="walk-man">🏃‍♂️</span><span style="font-family:'ZCOOL KuaiLe',cursive;font-size:20px;letter-spacing:1px;">下班学点啥</span></span>
        <div style="display:flex;align-items:center;gap:6px;">
            <span class="nav-time" id="navTime"></span>
            <button id="shareBtn" class="nav-share" aria-label="分享">↗</button>
        </div>
    </nav>

    <main class="main">
        <div class="tabs">
            <button class="tab active" data-tab="finance">市场速览</button>
            <button class="tab" data-tab="ai-pm">充电站</button>
        </div>

        <!-- 财经区 -->
        <section id="finance" class="section active">
            <div class="sub-tabs">
                <button class="sub-tab active" data-sub="realtime">今日大事</button>
                <button class="sub-tab" data-sub="daily">高手怎么看</button>

            </div>

            <!-- 实时新闻 -->
            <div id="realtime" class="sub-content active">
                <div class="afterwork-brief">
                    <div class="afterwork-kicker" id="afterworkKicker">下班先松口气</div>
                    <div class="afterwork-title" id="afterworkTitle">先看看钱今天都跑哪儿去了</div>
                    <div class="afterwork-copy" id="afterworkCopy">几分钟扫一眼市场，不做决策也没关系。成年人很忙，能看懂一点点已经很不错。</div>
                    <div class="afterwork-tags">
                        <span id="afterworkTagOne">不构成投资建议</span>
                        <span id="afterworkTagTwo">看懂一点就赚到</span>
                        <span id="afterworkTagThree">脑子低电量友好</span>
                    </div>
                </div>
                <div class="market-bar">
                    <div class="market-item" id="shIndex">
                        <span class="market-label">上证</span>
                        <span class="market-val">--</span>
                        <span class="market-change">--</span>
                    </div>
                    <div class="market-item" id="hkIndex">
                        <span class="market-label">恒生</span>
                        <span class="market-val">--</span>
                        <span class="market-change">--</span>
                    </div>
                    <div class="market-item" id="usIndex">
                        <span class="market-label">纳斯达克</span>
                        <span class="market-val">--</span>
                        <span class="market-change">--</span>
                    </div>
                    <div class="market-item" id="csi300Index">
                        <span class="market-label">沪深300</span>
                        <span class="market-val">--</span>
                        <span class="market-change">--</span>
                    </div>
                </div>
                <div class="market-note" id="marketNote">市场还在加载，先别急着给今天下结论。</div>
                <div id="alertArea"></div>
                <div class="section-header">
                    <span class="section-label">钱圈今天在吵什么</span>
                    <span class="refresh-hint" id="refreshHint">下拉刷新，不必用力</span>
                </div>
                <div id="hotNewsList" class="news-list"></div>
            </div>

            <!-- 投资观点 -->
            <div id="daily" class="sub-content">
                <div id="summaryContent"></div>
            </div>

            <!-- 持仓情报 -->
            <div id="holdings" class="sub-content">
                <div id="holdingsContent"></div>
            </div>
        </section>

        <!-- AI产品经理区 -->
        <section id="ai-pm" class="section">
            <div id="courseCenter"></div>
        </section>
    </main>

    <!-- 课程详情弹窗 -->
    <div id="courseModal" class="modal hidden">
        <div class="modal-sheet">
            <div class="modal-top">
                <div class="modal-spacer"></div>
                <h2 id="modalTitle">课程详情</h2>
                <button class="modal-x" id="modalClose">✕</button>
            </div>
            <div class="modal-scroll" id="modalBody"></div>
        </div>
    </div>

    <div class="site-stats">
        <div class="site-stats-card">
            <div class="site-stats-kicker">今日小卖部</div>
            <div class="site-stats-title">今天已有 <span id="todayUv">--</span> 位同事路过，翻了 <span id="todayPv">--</span> 次市场小报</div>
            <a href="https://cloud.umami.is/share/51d4b748-14ec-4708-a003-04ae51b47e83" target="_blank">看真实访问统计</a>
        </div>
    </div>

    <script defer src="https://cloud.umami.is/script.js" data-website-id="51d4b748-14ec-4708-a003-04ae51b47e83"></script>
    <script src="daily-data.js?v=18"></script>
    <script src="news-loader.js?v=20"></script>
    <script src="course-data.js?v=17"></script>
    <script src="course-series-data.js?v=18"></script>
    <script src="share.js?v=18"></script>
    <script src="holdings-data.js?v=17"></script>
    <script src="holdings-render.js?v=18"></script>
    <script src="course-app.js?v=18"></script>
    <script src="course-center-app.js?v=20"></script>
    <script src="app.js?v=21"></script>
    <script async src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    <script>
      (function(){
        // CDN 节点同步延迟兜底：页面加载后检测是否是 GitHub Pages 404 页面
        // 只在首次加载时触发一次（用 sessionStorage 标记）
        if (!sessionStorage.getItem('__cs_retried')) {
          var check = function(){
            // 检测 GitHub Pages 的 404 页面特征：标题包含 404 或 body 为空
            var title = document.title || '';
            var is404Page = title.indexOf('404') !== -1;
            var isEmptyBody = document.body && document.body.children.length <= 1;
            if (is404Page || isEmptyBody) {
              sessionStorage.setItem('__cs_retried', '1');
              window.location.reload(true);
            }
          };
          // DOM 就绪后立即检查，3 秒后再次检查（给 CDN 同步留时间窗口）
          if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', check);
          } else {
            check();
          }
          setTimeout(check, 3000);
        }
      })();
    </script>
</body>
</html>
