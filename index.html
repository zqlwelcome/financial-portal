<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>学习门户</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="nav">
        <span class="nav-logo">📚 学习门户</span>
        <span class="nav-time" id="navTime"></span>
    </nav>

    <main class="main">
        <div class="tabs">
            <button class="tab active" data-tab="finance">📰 财经</button>
            <button class="tab" data-tab="ai-pm">🤖 AI产品</button>
        </div>

        <!-- ===== 财经区 ===== -->
        <section id="finance" class="section active">
            <div class="sub-tabs">
                <button class="sub-tab active" data-sub="realtime">⚡ 实时</button>
                <button class="sub-tab" data-sub="daily">📊 总结</button>
            </div>

            <!-- 实时新闻 -->
            <div id="realtime" class="sub-content active">
                <!-- 市场概览 -->
                <div class="market-bar">
                    <div class="market-item up">
                        <span class="market-label">上证</span>
                        <span class="market-val">3,412.56</span>
                        <span class="market-change">+1.23%</span>
                    </div>
                    <div class="market-item down">
                        <span class="market-label">恒生</span>
                        <span class="market-val">18,234.12</span>
                        <span class="market-change">-0.45%</span>
                    </div>
                    <div class="market-item up">
                        <span class="market-label">纳斯达克</span>
                        <span class="market-val">16,892.34</span>
                        <span class="market-change">+0.89%</span>
                    </div>
                </div>

                <!-- 外汇提示 -->
                <div class="alert-card forex">
                    <div class="alert-icon">💱</div>
                    <div class="alert-content">
                        <div class="alert-title">外汇提示</div>
                        <div class="alert-text">日元跌至160关口，日本央行干预预期升温</div>
                    </div>
                </div>

                <!-- 股市动向 -->
                <div class="alert-card stock">
                    <div class="alert-icon">📈</div>
                    <div class="alert-content">
                        <div class="alert-title">股市动向</div>
                        <div class="alert-text">A股放量上涨，北向资金净流入超80亿</div>
                    </div>
                </div>

                <!-- 热门新闻 TOP10 -->
                <div class="section-label">🔥 热门 TOP 10</div>
                <div id="hotNewsList" class="news-list"></div>
            </div>

            <!-- 每日总结 -->
            <div id="daily" class="sub-content">
                <div class="filter-row">
                    <button class="filter-btn active" data-investor="all">全部</button>
                    <button class="filter-btn" data-investor="templeton">🌍 邓</button>
                    <button class="filter-btn" data-investor="buffett">💰 巴</button>
                    <button class="filter-btn" data-investor="munger">🧠 芒</button>
                </div>
                <div id="dailyList" class="date-list"></div>
                <div id="briefingDetail" class="detail-area"></div>
            </div>
        </section>

        <!-- AI产品经理区 -->
        <section id="ai-pm" class="section">
            <div class="status-bar">
                <div class="streak">
                    <span class="streak-num" id="streakDays">0</span>
                    <span class="streak-label">连续</span>
                </div>
                <div class="progress-mini">
                    <span id="completionRate">0%</span>
                    <div class="progress-bar-mini">
                        <div class="progress-fill-mini" id="progressFill" style="width: 0%"></div>
                    </div>
                </div>
            </div>
            <div class="knowledge-card">
                <div class="kcard-header">
                    <span class="kcard-badge">今日</span>
                    <span class="kcard-title" id="pmTitle">加载中...</span>
                </div>
                <div class="kcard-body" id="pmContent"></div>
                <button class="checkin-btn" id="checkinBtn">✓ 打卡</button>
            </div>
            <div class="skills-row">
                <div class="skill-item"><span>🎯</span><span>技术</span></div>
                <div class="skill-item"><span>📊</span><span>数据</span></div>
                <div class="skill-item"><span>💡</span><span>设计</span></div>
                <div class="skill-item"><span>🤝</span><span>协作</span></div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
