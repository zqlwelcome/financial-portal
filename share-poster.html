<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>分享海报</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #f5f5f7;
    font-family: -apple-system, "PingFang SC", "ZCOOL KuaiLe", sans-serif;
  }
  .poster {
    width: 600px;
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    border: 2px solid #FFD700;
  }
  .hero {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 12px 16px 10px;
    text-align: center;
  }
  .hero .top-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .hero .mascot { font-size: 28px; }
  .hero h1 {
    font-family: 'ZCOOL KuaiLe', cursive;
    font-size: 22px;
    color: #fff;
    letter-spacing: 1px;
  }
  .hero .sub {
    font-size: 11px;
    color: rgba(255,255,255,0.9);
    margin-top: 2px;
  }

  .body { padding: 8px 12px; }

  .feature-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 4px;
    margin-bottom: 8px;
  }
  .f-card {
    border-radius: 8px;
    padding: 6px 2px;
    text-align: center;
    border: 1px solid #eee;
  }
  .f-card .icon { font-size: 16px; }
  .f-card .title { font-size: 10px; font-weight: 700; color: #1d1d1f; }
  .f-card .desc { font-size: 8px; color: #666; }
  .fc1 { background: #f3e5f5; border-color: #ce93d8; }
  .fc2 { background: #e3f2fd; border-color: #90caf9; }
  .fc3 { background: #e8f5e9; border-color: #a5d6a7; }
  .fc4 { background: #fff8e1; border-color: #ffe082; }

  .course-cloud { 
    display: flex; 
    flex-wrap: wrap; 
    gap: 3px; 
    justify-content: center;
    margin-bottom: 8px;
  }
  .c-tag {
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 9px;
    border: 1px solid #ddd;
    background: #f5f5f7;
    color: #333;
  }

  .footer {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 10px 16px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  }
  .footer .qr-box {
    background: #fff;
    border-radius: 8px;
    padding: 4px;
    flex-shrink: 0;
  }
  .footer .qr-box img { width: 70px; height: 70px; display: block; border-radius: 3px; }
  .footer .url { font-size: 12px; font-weight: 700; color: #FECA57; }
  .footer .hint { font-size: 10px; color: rgba(255,255,255,0.8); margin-top: 1px; }
</style>
</head>
<body>
<div class="poster">
  <div class="hero">
    <div class="top-row">
      <span class="mascot">🏃‍♂️</span>
      <h1>下班学点啥</h1>
    </div>
    <div class="sub">📰 实时新闻 · 🧠 智囊团 · 📈 行情 · 🤖 AI课程</div>
  </div>

  <div class="body">
    <div class="feature-row">
      <div class="f-card fc1"><div class="icon">🧠</div><div class="title">智囊团</div><div class="desc">每日大师观点</div></div>
      <div class="f-card fc2"><div class="icon">📰</div><div class="title">热门TOP10</div><div class="desc">10分钟更新</div></div>
      <div class="f-card fc3"><div class="icon">📈</div><div class="title">实时行情</div><div class="desc">美股A股港股</div></div>
      <div class="f-card fc4"><div class="icon">📋</div><div class="title">持仓情报</div><div class="desc">13F跟踪</div></div>
    </div>

    <div class="course-cloud">
      <span class="c-tag">🧠 角色定位</span>
      <span class="c-tag">🔭 行业全景</span>
      <span class="c-tag">💬 工程沟通</span>
      <span class="c-tag">⚙️ 大模型选型</span>
      <span class="c-tag">💰 成本估算</span>
      <span class="c-tag">🤖 Agent实战</span>
      <span class="c-tag">📊 指标体系</span>
      <span class="c-tag">🧪 AB测试</span>
      <span class="c-tag">🎨 交互原则</span>
      <span class="c-tag">🛡️ 降级策略</span>
      <span class="c-tag">🔐 金融合规</span>
      <span class="c-tag">🚀 从0到1</span>
      <span class="c-tag">🎯 面试突击</span>
      <span class="c-tag">📦 灰度上线</span>
      <span class="c-tag">📖 案例拆解</span>
    </div>
  </div>

  <div class="footer">
    <div class="qr-box">
      <img src="assets/qr-code.png" alt="扫码">
    </div>
    <div>
      <div class="url">zqlwelcomelearninghub.pages.dev</div>
      <div class="hint">⭐ 扫码打开 · 完全免费</div>
    </div>
  </div>
</div>
</body>
</html>
