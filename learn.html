<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI产品经理学习</title>
    <link rel="canonical" href="https://learningcenter.pages.dev/learn.html">
    <script>if(location.hostname==='zqlwelcome.github.io'){location.replace('https://learningcenter.pages.dev/learn.html')}</script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="learn-style.css">
</head>
<body>
    <nav class="nav">
        <a href="index.html" class="nav-back">← 返回</a>
        <span class="nav-title">AI产品经理学习</span>
        <div class="nav-spacer"></div>
    </nav>
    
    <main class="main">
        <div class="progress-banner">
            <div class="progress-row">
                <div class="progress-circle">
                    <svg viewBox="0 0 100 100">
                        <circle class="pbg" cx="50" cy="50" r="45"/>
                        <circle class="pfill" id="progressRing" cx="50" cy="50" r="45" style="stroke-dasharray:283;stroke-dashoffset:283"/>
                    </svg>
                    <div class="ptext"><span id="progressPct">0</span>%</div>
                </div>
                <div class="progress-info">
                    <h2>学习进度</h2>
                    <p>已完成 <span id="progressDone">0</span>/<span id="progressTotal">15</span> 课时</p>
                </div>
            </div>
            <div class="progress-stats">
                <span>🔥 连续 <span id="streakDays">0</span> 天</span>
                <span>⭐ <span id="progressStars">0</span> 颗星</span>
            </div>
        </div>
        
        <div id="courseList"></div>
    </main>
    
    <div class="modal hidden" id="courseModal">
        <div class="modal-sheet">
            <div class="modal-top">
                <div class="modal-spacer"></div>
                <h2 id="modalTitle">详情</h2>
                <button class="modal-x" id="modalClose">✕</button>
            </div>
            <div class="modal-scroll" id="modalBody"></div>
        </div>
    </div>
    
    <script src="course-data.js"></script>
    <script src="course-app.js"></script>
</body>
</html>
